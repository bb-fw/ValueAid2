<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a5c">
<title>ValueAid — Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
<style>
/* Stats bar */
.stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;margin-top:12px}
.stat-cell{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px 8px;text-align:center}
.stat-num{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txmt);line-height:1.3}
/* Compact case cards */
.case-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:7px;cursor:pointer;transition:opacity var(--tr);display:flex;align-items:stretch;overflow:hidden}
.case-card:active{opacity:.75}
.case-side{width:4px;flex-shrink:0}
.case-side.assigned{background:var(--bd)}
.case-side.progress{background:var(--bl)}
.case-side.delayed{background:var(--am)}
.case-side.complete{background:var(--gn)}
.case-body{flex:1;padding:9px 11px;min-width:0}
.case-top{display:flex;align-items:baseline;gap:6px;margin-bottom:2px}
.case-ref{font-size:10px;font-weight:700;color:var(--txmt);letter-spacing:.6px;flex-shrink:0}
.case-addr{font-size:13px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.case-bottom{display:flex;align-items:center;justify-content:space-between;gap:6px}
.case-meta-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txmt);min-width:0}
.case-dl{font-size:10px;text-align:right;flex-shrink:0}
.pip-bar{display:flex;gap:2px;margin-bottom:5px}
.pip-stage{flex:1;height:3px;border-radius:2px;background:var(--bd)}
.pip-stage.done{background:var(--gn)}
.pip-stage.active{background:var(--bl)}
.pip-stage.delayed{background:var(--am)}
.status-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;white-space:nowrap}
.badge-assigned{background:var(--sf2);color:var(--txmt);border:1px solid var(--bd)}
.badge-progress{background:var(--blbg);color:var(--bl)}
.badge-delayed{background:var(--ambg);color:var(--am)}
.badge-complete{background:var(--gnbg);color:var(--gn)}
.deadline-txt{color:var(--txmt)}
.deadline-urgent{color:var(--rd);font-weight:600}
.deadline-soon{color:var(--am);font-weight:600}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <a href="index.html" class="logo">ValueAid <span>Tracker</span></a>
    <div class="hdr-acts"><a href="settings.html" class="hbtn settings-btn">&#9881; Settings</a></div>
  </header>
  <div id="travel-banner" class="travel-banner">
    <div class="pulse"></div>
    <span id="banner-txt" style="flex:1;font-size:13px">Travel in progress...</span>
    <a href="travel.html" class="btn bsm" style="background:var(--gd);color:#fff;border:none;padding:6px 12px">View</a>
  </div>
  <div class="page-content">
    <div class="pgw">
      <div class="stats-bar" id="stats-bar"></div>
      <div style="position:relative;margin-bottom:8px">
        <input type="text" id="search-inp" placeholder="Search ref, address, client..."
               style="padding-left:32px" oninput="searchQuery=this.value;renderCases()">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txmt);font-size:15px;pointer-events:none">⌕</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
        <span style="font-size:12px;color:var(--txmt);flex-shrink:0">Order by</span>
        <select id="sort-field" onchange="saveSortPref();renderCases()" style="flex:1;min-width:0;font-size:12px;padding:5px 8px">
          <option value="deadline">Deadline</option>
          <option value="ref">Ref No.</option>
          <option value="progress">Progress Stage</option>
        </select>
        <select id="sort-dir" onchange="saveSortPref();renderCases()" style="flex-shrink:0;width:80px;font-size:12px;padding:5px 8px">
          <option value="asc">↑ Asc</option>
          <option value="desc">↓ Desc</option>
        </select>
      </div>
      <div id="case-list"></div>
    </div>
  </div>
  <button class="fab" onclick="newCase()" title="New Case">&#43;</button>
  <nav class="bottom-nav">
    <a href="tracker.html" class="ni active"><span class="ni-icon">&#128203;</span>Tracker</a>
    <a href="index.html" class="ni"><span class="ni-icon">&#128196;</span>Inspect</a>
    <a href="travel.html" class="ni"><span class="ni-icon">&#128663;</span>Travel</a>
    <a href="calendar.html" class="ni"><span class="ni-icon">&#128197;</span>Calendar</a>
  </nav>
</div>
<div id="toast"></div>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script src="js/picker.js"></script>
<script>
'use strict';

let searchQuery = '';
let _completedExpanded = false;
function toggleCompletedSection() {
  _completedExpanded = !_completedExpanded;
  renderCases();
}
function localISO(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}

// ── Helpers ───────────────────────────────────────────────────
function getStages(c) {
  if (c.checklistSnapshot && c.checklistSnapshot.length) return c.checklistSnapshot;
  const cl = (VA.db.checklists||[]).find(x=>x.id===c.checklistId);
  return cl ? cl.stages : VA.BUILTIN_STAGES;
}

function caseStatus(c) {
  if (c.delayed) return { label:'Delayed', cls:'badge-delayed' };
  const isAuto=c.autoMode!==false;
  const stage=getEffectiveStage(c);
  const stages=isAuto?AUTO_STAGES:getStages(c);
  if (!stage||stage===stages[0]) return { label:stages[0]||'Assigned', cls:'badge-assigned' };
  if (stage===stages[stages.length-1]) return { label:stage, cls:'badge-complete' };
  return { label:stage, cls:'badge-progress' };
}

function deadlineLabel(deadline) {
  if (!deadline) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const dl = new Date(deadline+'T00:00:00');
  const diff = Math.round((dl-today)/(1000*60*60*24));
  let txt, cls, sub;
  if (diff < 0) {
    txt = 'Due ' + VA.fmtDate(deadline);
    sub = Math.abs(diff) + ' day' + (Math.abs(diff)===1?'':'s') + ' overdue';
    cls = 'deadline-urgent';
  } else if (diff === 0) {
    txt = 'Due today';
    sub = null;
    cls = 'deadline-urgent';
  } else if (diff <= 3) {
    txt = 'Due ' + VA.fmtDate(deadline);
    sub = 'in ' + diff + ' day' + (diff===1?'':'s');
    cls = 'deadline-soon';
  } else {
    txt = 'Due ' + VA.fmtDate(deadline);
    sub = 'in ' + diff + ' day' + (diff===1?'':'s');
    cls = 'deadline-txt';
  }
  return { txt, sub, cls };
}

function pipelineBar(c) {
  const isAuto=c.autoMode!==false;
  const stages=isAuto?AUTO_STAGES:getStages(c);
  let currentIdx=stages.indexOf(getEffectiveStage(c));
  if(currentIdx<0)currentIdx=0;
  return stages.map((st, i) => {
    let cls = 'pip-stage';
    if (c.delayed && i === currentIdx) cls += ' delayed';
    else if (i < currentIdx) cls += ' done';
    else if (i === currentIdx) cls += ' active';
    return `<div class="${cls}" title="${VA.esc(st)}"></div>`;
  }).join('');
}

// ── Render stats bar ─────────────────────────────────────────
const AUTO_STAGES=['Case Created','Inspection Booked','Inspection Completed','Case Complete'];
function getAutoStage(c){
  if(c.autoComplete)return AUTO_STAGES[3];
  if(c.inspDate){
    const dt=c.inspTime?new Date(c.inspDate+'T'+c.inspTime):new Date(c.inspDate+'T23:59:59');
    return new Date()>=dt?AUTO_STAGES[2]:AUTO_STAGES[1];
  }
  return AUTO_STAGES[0];
}
function getEffectiveStage(c){
  return (c.autoMode!==false)?getAutoStage(c):(c.stage||getStages(c)[0]||'');
}
const isCaseComplete=c=>{
  if(c.autoMode!==false)return !!c.autoComplete;
  const stg=getStages(c);return c.stage&&c.stage===stg[stg.length-1];
};
function renderStats() {
  const el = document.getElementById('stats-bar'); if (!el) return;
  const all = VA.db.cases||[];
  const completed = all.filter(isCaseComplete).length;
  const ongoing = all.length - completed;
  const nowMs=Date.now();
  const upcoming=all.filter(c=>{
    if(!c.inspDate||isCaseComplete(c))return false;
    const dt=c.inspTime?new Date(c.inspDate+'T'+c.inspTime):new Date(c.inspDate+'T23:59:59');
    return dt.getTime()>nowMs;
  }).length;
  const inspected=all.filter(c=>{
    if(!c.inspDate||isCaseComplete(c))return false;
    const dt=c.inspTime?new Date(c.inspDate+'T'+c.inspTime):new Date(c.inspDate+'T23:59:59');
    return dt.getTime()<=nowMs;
  }).length;
  el.innerHTML =
    `<div class="stat-cell"><div class="stat-num" style="color:var(--bl)">${ongoing}</div><div class="stat-lbl">Ongoing</div></div>` +
    `<div class="stat-cell"><div class="stat-num" style="color:var(--am)">${upcoming}</div><div class="stat-lbl">Upcoming<br>Inspections</div></div>` +
    `<div class="stat-cell"><div class="stat-num" style="color:var(--gn)">${inspected}</div><div class="stat-lbl">Inspected</div></div>`;
}

// ── Render cases ──────────────────────────────────────────────
function renderCases() {
  renderStats();
  const el = document.getElementById('case-list'); if (!el) return;
  const q = (searchQuery||'').toLowerCase();
  let cases = (VA.db.cases||[]).slice();

  if (q) {
    cases = cases.filter(c =>
      (c.ref||'').includes(q) ||
      (c.addr||'').toLowerCase().includes(q) ||
      (c.client||'').toLowerCase().includes(q) ||
      (c.phone||'').replace(/\s/g,'').includes(q.replace(/\s/g,''))
    );
  }

  // ── Sort ──────────────────────────────────────────────────────
  const sortField = document.getElementById('sort-field')?.value || 'deadline';
  const sortDir   = document.getElementById('sort-dir')?.value   || 'asc';
  const dirMul    = sortDir === 'asc' ? 1 : -1;

  // Progress stage: # of stages completed = index of current stage in snapshot
  const stageProgress = c => {
    const isAuto=c.autoMode!==false;
    const stg=isAuto?AUTO_STAGES:getStages(c);
    return Math.max(0,stg.indexOf(getEffectiveStage(c)));
  };

  cases.sort((a, b) => {
    // Completed always last regardless of sort direction
    const ac = isCaseComplete(a) ? 1 : 0, bc = isCaseComplete(b) ? 1 : 0;
    if (ac !== bc) return ac - bc;

    let cmp = 0;
    if (sortField === 'ref') {
      const ra = (a.ref||'').padStart(10,'0'), rb = (b.ref||'').padStart(10,'0');
      cmp = ra < rb ? -1 : ra > rb ? 1 : 0;
    } else if (sortField === 'progress') {
      cmp = stageProgress(a) - stageProgress(b);
    } else {
      // deadline (default)
      const da = a.deadline||'9999-99-99', db2 = b.deadline||'9999-99-99';
      cmp = da < db2 ? -1 : da > db2 ? 1 : 0;
    }
    return cmp * dirMul;
  });

  if (!cases.length) {
    el.innerHTML = `<div class="empty-state"><div class="esi">&#128203;</div>
      <h3>${q ? 'No results' : 'No cases yet'}</h3>
      <p>${q ? 'Try a different search.' : 'Tap + to add your first case.'}</p></div>`;
    return;
  }

  const sectionHeader = (label, color) =>
    `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txmt);padding:12px 2px 5px;display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block"></span>${label}</div>`;

  const cardHtml = c => {
    const st = caseStatus(c);
    const dl = deadlineLabel(c.deadline);
    const sideMap = { 'badge-assigned':'assigned', 'badge-progress':'progress', 'badge-delayed':'delayed', 'badge-complete':'complete' };
    const sideCls = sideMap[st.cls]||'assigned';
    const inspMeta = c.inspDate ? `<span>&#128197; ${VA.fmtDate(c.inspDate)}</span>` : '';
    const phoneMeta = c.phone ? `<span>&#128222; ${VA.esc(c.phone)}</span>` : '';
    const linkedMeta = c.projectId ? `<span style="color:var(--gn)">&#128279;</span>` : '';
    const dlHtml = dl
      ? `<div class="${dl.cls}" style="font-size:10px;font-weight:600">${dl.txt}</div>${dl.sub ? `<div style="font-size:9px;color:var(--txmt)">${dl.sub}</div>` : ''}`
      : '';
    return `<div class="case-card" onclick="location.href='case-editor.html?id=${VA.esc(c.id)}'">
      <div class="case-side ${sideCls}"></div>
      <div class="case-body">
        <div class="pip-bar">${pipelineBar(c)}</div>
        <div class="case-top">
          <span class="case-ref">${c.ref ? '#'+VA.esc(c.ref) : '—'}</span>
          <span class="case-addr">${VA.esc(c.addr||'No address')}</span>
        </div>
        <div class="case-bottom">
          <div class="case-meta-row">
            <span class="status-badge ${st.cls}">${VA.esc(st.label)}</span>
            ${phoneMeta}${inspMeta}${linkedMeta}
          </div>
          ${dl ? `<div class="case-dl">${dlHtml}</div>` : ''}
        </div>
      </div>
    </div>`;
  };

  const active = cases.filter(c => !isCaseComplete(c));
  const completed = cases.filter(c => isCaseComplete(c));
  let html = active.map(cardHtml).join('');
  if (completed.length) {
    html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txmt);padding:12px 2px 5px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleCompletedSection()">
      <div style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--gn);display:inline-block"></span>Completed (${completed.length})</div>
      <span style="font-size:14px">${_completedExpanded ? '&#9650;' : '&#9660;'}</span>
    </div>`;
    if (_completedExpanded) html += completed.map(cardHtml).join('');
  }
  el.innerHTML = html;
}

function newCase() {
  const id = VA.uid();
  const today = localISO(new Date());
  const defaultCl = (VA.db.checklists||[])[0];
  VA.db.cases.push({
    id, ref:'', addr:'', client:'', phone:'',
    inspDate:'', inspTime:'',
    createdAt: today, deadline:'',
    stage: defaultCl ? defaultCl.stages[0] : VA.BUILTIN_STAGES[0],
    autoMode: !(VA.db.settings&&VA.db.settings.defaultAutoMode===false), autoComplete: false,
    delayed: false, notes:'',
    checklistId: defaultCl ? defaultCl.id : '',
    checklistSnapshot: defaultCl ? [...defaultCl.stages] : [...VA.BUILTIN_STAGES],
    projectId: null
  });
  VA.save();
  location.href = 'case-editor.html?id=' + id;
}

function saveSortPref() {
  try {
    localStorage.setItem('va_sort_field', document.getElementById('sort-field')?.value||'deadline');
    localStorage.setItem('va_sort_dir',   document.getElementById('sort-dir')?.value||'asc');
  } catch(e) {}
}
function loadSortPref() {
  try {
    const f = localStorage.getItem('va_sort_field');
    const d = localStorage.getItem('va_sort_dir');
    const sf = document.getElementById('sort-field');
    const sd = document.getElementById('sort-dir');
    if (sf && f) sf.value = f;
    if (sd && d) sd.value = d;
  } catch(e) {}
}
pageInit();
loadSortPref();
renderCases();
</script>
</body>
</html>
