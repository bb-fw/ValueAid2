<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a5c">
<title>ValueAid — Calendar</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <a href="index.html" class="logo">ValueAid <span>Schedule</span></a>
    <div class="hdr-acts"><a href="settings.html" class="hbtn settings-btn">&#9881; Settings</a></div>
  </header>
  <div id="travel-banner" class="travel-banner">
    <div class="pulse"></div>
    <span id="banner-txt" style="flex:1;font-size:13px">Travel in progress...</span>
    <a href="travel.html" class="btn bsm" style="background:var(--gd);color:#fff;border:none;padding:6px 12px">View</a>
  </div>
  <div class="page-content">
    <div class="pgw">
      <div class="card">
        <div class="card-body">
          <div class="cal-nav">
            <button class="btn bsm bs" style="width:36px;padding:0" onclick="calPrev()">&#8249;</button>
            <div class="cal-month" id="cal-label"></div>
            <button class="btn bsm bs" style="width:36px;padding:0" onclick="calNext()">&#8250;</button>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>
      </div>
      <div id="cal-events"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="tracker.html" class="ni"><span class="ni-icon">&#128203;</span>Tracker</a>
    <a href="index.html" class="ni"><span class="ni-icon">&#128196;</span>Inspect</a>
    <a href="travel.html" class="ni"><span class="ni-icon">&#128663;</span>Travel</a>
    <a href="calendar.html" class="ni active"><span class="ni-icon">&#128197;</span>Calendar</a>
  </nav>
</div>
<div id="toast"></div>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script src="js/picker.js"></script>
<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
let cY,cM,cSel;
function localISO(d) {
  // Returns YYYY-MM-DD in LOCAL timezone, not UTC
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function initCal(){const n=new Date();cY=n.getFullYear();cM=n.getMonth();cSel=localISO(n);}
function calPrev(){cM--;if(cM<0){cM=11;cY--;}renderCal();}
function calNext(){cM++;if(cM>11){cM=0;cY++;}renderCal();}
function buildEventMap() {
  // ev[date] = { inspections: [], deadlines: [], caseInspections: [] }
  const ev = {};
  const ensure = iso => { if(!ev[iso]) ev[iso]={inspections:[],deadlines:[],caseInspections:[]}; };
  // Linked inspection projects (only those NOT linked to a case, to avoid duplication)
  VA.db.projects.forEach(p => {
    if (p.date && !p.caseId && !p.archived) { ensure(p.date); ev[p.date].inspections.push(p); }
  });
  // Cases: inspection date + deadline
  (VA.db.cases||[]).forEach(c => {
    if (c.inspDate) { ensure(c.inspDate); ev[c.inspDate].caseInspections.push(c); }
    const cStages=(c.checklistSnapshot&&c.checklistSnapshot.length)?c.checklistSnapshot:((VA.db.checklists||[]).find(x=>x.id===c.checklistId)||{stages:['Case Complete']}).stages;
    const cDone=c.stage&&c.stage===cStages[cStages.length-1];
    if(c.deadline&&!cDone){ensure(c.deadline);ev[c.deadline].deadlines.push(c);}
  });
  return ev;
}

function renderCal(){
  document.getElementById('cal-label').textContent=MONTHS[cM]+' '+cY;
  const today=localISO(new Date());
  const ev=buildEventMap();
  const first=new Date(cY,cM,1).getDay(),dim=new Date(cY,cM+1,0).getDate(),prev=new Date(cY,cM,0).getDate();
  let h=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dl">${d}</div>`).join('');
  for(let i=0;i<first;i++)h+=`<div class="cal-day other-month"><span class="dn">${prev-first+i+1}</span></div>`;
  for(let d=1;d<=dim;d++){
    const iso=`${cY}-${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const e=ev[iso]||{inspections:[],deadlines:[],caseInspections:[]};
    const totalInsp=(e.inspections.length)+(e.caseInspections.length);
    const hasDeadline=e.deadlines.length>0;
    const hasEvents=totalInsp>0||hasDeadline;
    let indicators='';
    if(totalInsp>0) indicators+=`<span style="font-size:8px;font-weight:700;color:var(--gd);background:var(--gnbg);border-radius:6px;padding:0 3px;line-height:1.6">${totalInsp}</span>`;
    if(hasDeadline) indicators+=`<span style="font-size:8px;font-weight:700;color:var(--rd);background:var(--rdbg);border-radius:6px;padding:0 3px;line-height:1.6">${e.deadlines.length}</span>`;
    h+=`<div class="cal-day${iso===today?' today':''}${iso===cSel?' selected':''}${hasEvents?' has-events':''}" data-iso="${iso}" onclick="calSel('${iso}')">
      <span class="dn">${d}</span>
      ${indicators?`<div style="display:flex;gap:2px;justify-content:center;margin-top:1px;flex-wrap:wrap">${indicators}</div>`:''}
    </div>`;
  }
  const rem=(7-(first+dim)%7)%7;for(let i=1;i<=rem;i++)h+=`<div class="cal-day other-month"><span class="dn">${i}</span></div>`;
  document.getElementById('cal-grid').innerHTML=h;
  renderEvs(cSel, ev);
}
function calSel(iso) {
  cSel = iso;
  document.querySelectorAll('.cal-day').forEach(el => {
    el.classList.toggle('selected', el.dataset.iso === iso);
  });
  renderEvs(iso, buildEventMap());
}
function renderEvs(date, ev){
  const el=document.getElementById('cal-events');
  if (!ev) ev=buildEventMap();
  const e=ev[date]||{inspections:[],deadlines:[],caseInspections:[]};
  const hasAnything=e.inspections.length||e.caseInspections.length||e.deadlines.length;
  if(!hasAnything){
    el.innerHTML=`<p style="font-size:13px;color:var(--txmt);padding:7px 3px">Nothing on ${VA.fmtDateLong(date)}.</p>`;
    return;
  }
  let html='';
  // All inspections (standalone projects + case inspections) under one header
  const allInsp = e.inspections.length + e.caseInspections.length;
  if(allInsp){
    html+=`<div class="sh mt8"><h2 style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--gd);display:inline-block"></span>Inspections — ${VA.fmtDateLong(date)}</h2></div>`;
    html+=e.inspections.map(p=>`<div class="ev-item" onclick="location.href='editor.html?id=${p.id}'">
      <div class="ev-time">${VA.esc(p.time||'Time not set')} &bull; ${VA.esc(p.ptype||'Property')}</div>
      <div class="ev-title">${VA.esc(p.addr||'Untitled')}</div>
      <div class="ev-sub">${p.valuer?'Valuer: '+VA.esc(p.valuer):''}${p.cond?' &bull; '+VA.esc(p.cond):''}</div>
    </div>`).join('');
    html+=e.caseInspections.map(c=>`<div class="ev-item" onclick="location.href='case-editor.html?id=${VA.esc(c.id)}'">
      <div class="ev-time">${VA.esc(c.inspTime||'Time not set')}${c.ref?' &bull; Ref #'+VA.esc(c.ref):''}</div>
      <div class="ev-title">${VA.esc(c.addr||'No address')}</div>
      <div class="ev-sub">${c.client?'Client: '+VA.esc(c.client):''}${c.delayed?' &bull; <span style="color:var(--am)">Delayed</span>':''}</div>
    </div>`).join('');
  }
  // Deadlines
  if(e.deadlines.length){
    html+=`<div class="sh mt8"><h2 style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--rd);display:inline-block"></span>Case Deadlines — ${VA.fmtDateLong(date)}</h2></div>`;
    html+=e.deadlines.map(c=>`<div class="ev-item" style="border-left:3px solid var(--rd)" onclick="location.href='case-editor.html?id=${VA.esc(c.id)}'">
      <div class="ev-time" style="color:var(--rd)">&#9888; Deadline${c.ref?' &bull; Ref #'+VA.esc(c.ref):''}</div>
      <div class="ev-title">${VA.esc(c.addr||'No address')}</div>
      <div class="ev-sub">${c.client?'Client: '+VA.esc(c.client):''}${' &bull; Stage: '+VA.esc(c.stage||'—')}</div>
    </div>`).join('');
  }
  el.innerHTML=html;
}
pageInit();initCal();renderCal();
</script>
</body>
</html>
