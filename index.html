<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a3a5c">
<title>ValueAid</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <a href="index.html" class="logo">ValueAid <span>Inspections</span></a>
    <div class="hdr-acts">
      <a href="settings.html" class="hbtn settings-btn">&#9881; Settings</a>
    </div>
  </header>

  <div id="travel-banner" class="travel-banner">
    <div class="pulse"></div>
    <span id="banner-txt" style="flex:1;font-size:13px">Travel in progress...</span>
    <a href="travel.html" class="btn bsm" style="background:var(--gd);color:#fff;border:none;padding:6px 12px">View</a>
  </div>

  <div class="page-content">
    <div class="pgw">
      <div class="sh mt12"><h2 id="proj-count">Projects</h2></div>
      <div style="position:relative;margin-bottom:12px">
        <input type="text" id="search-inp" placeholder="Search projects..." style="padding-left:32px" oninput="searchQuery=this.value;renderProjects()">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txmt);font-size:15px;pointer-events:none">&#10138;</span>
      </div>
      <div id="proj-list"></div>
    </div>
  </div>

  <!-- FAB at bottom right -->
  <button class="fab" onclick="openNewProject()" title="New Project">&#43;</button>

  <nav class="bottom-nav">
    <a href="tracker.html" class="ni"><span class="ni-icon">&#128203;</span>Tracker</a>
    <a href="index.html" class="ni active"><span class="ni-icon">&#128196;</span>Inspect</a>
    <a href="travel.html" class="ni"><span class="ni-icon">&#128663;</span>Travel</a>
    <a href="calendar.html" class="ni"><span class="ni-icon">&#128197;</span>Calendar</a>
  </nav>
</div>
<div id="toast"></div>

<!-- NEW PROJECT SHEET -->
<div class="overlay" id="ov-new">
  <div class="sheet">
    <div class="sheet-hdr">
      <button class="btn bsm bs" style="width:34px;padding:0" onclick="closeOv('ov-new')">&#10005;</button>
      <h3>New Inspection Project</h3>
    </div>
    <div class="sheet-body">
      <p style="font-size:13px;color:var(--txmt);margin-bottom:8px">Choose layout:</p>
      <div class="layout-grid">
        <div class="layout-btn selected" id="lb-a" onclick="pickLayout('A')">
          <div class="lb-icon">&#128196;</div>
          <div class="lb-title">Standard</div>
          <div class="lb-desc">Findings by category, accommodations by level</div>
        </div>
        <div class="layout-btn" id="lb-b" onclick="pickLayout('B')">
          <div class="lb-icon">&#127968;</div>
          <div class="lb-title">Per Unit</div>
          <div class="lb-desc">Findings recorded per unit/room individually</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="fg"><label class="fl">Reference No.</label><input type="text" id="np-ref" inputmode="numeric" maxlength="6" placeholder="e.g. 240123"></div>
      <div class="r2">
        <div class="fg"><label class="fl">Date of Inspection</label><input type="date" id="np-date"></div>
        <div class="fg"><label class="fl">Time</label><input type="time" id="np-time"></div>
      </div>
      <div class="fg">
        <label class="fl">Valuer-in-Charge</label>
        <div style="display:flex;gap:6px">
          <select id="np-valuer" style="flex:1"></select>
          <button class="btn bs bsm" onclick="openValuerMgr()">Edit</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Property Type</label>
        <div style="display:flex;gap:6px">
          <select id="np-ptype" style="flex:1"></select>
          <button class="btn bs bsm" onclick="openPtypeMgr()">Edit</button>
        </div>
      </div>
      <div class="r2">
        <div class="fg"><label class="fl">No. of Storeys</label><input type="number" id="np-storeys" min="1" max="99" placeholder="1"></div>
        <div class="fg"><label class="fl">Occupancy</label>
          <select id="np-occ">
            <option value="">— Select —</option>
            <option>Owner-Occupied</option><option>Tenanted</option><option>Vacant</option>
            <option>Partially Owner-Occupied &amp; Tenanted</option>
            <option>Partially Owner-Occupied &amp; Vacant</option>
            <option>Partially Tenanted &amp; Vacant</option><option>N.A.</option>
          </select>
        </div>
      </div>
      <div class="fg"><label class="fl">Property Address</label><input type="text" id="np-addr" placeholder="Full address"></div>
      <div class="fg"><label class="fl">Condition</label>
        <select id="np-cond">
          <option value="">— Select —</option>
          <option>New</option><option>Very Good</option><option>Good</option>
          <option>Above Average</option><option>Average</option><option>Below Average</option>
          <option>Fair</option><option>Poor</option><option>Under Construction</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Template</label>
        <select id="np-tpl"><option value="">— Default —</option></select>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="btn bs" onclick="closeOv('ov-new')">Cancel</button>
      <button class="btn bp" style="flex:1" onclick="createProject()">Create Project &#8594;</button>
    </div>
  </div>
</div>

<!-- INLINE MANAGER (valuers / prop types) -->
<div class="overlay" id="mgr-sheet">
  <div class="sheet">
    <div class="sheet-hdr">
      <button class="btn bsm bs" style="width:34px;padding:0" onclick="closeOv('mgr-sheet')">&#10005;</button>
      <h3 id="mgr-title">Manage</h3>
    </div>
    <div class="sheet-body">
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <input type="text" id="mgr-inp" placeholder="Add new..." style="flex:1">
        <button class="btn bp bsm" id="mgr-add-btn">Add</button>
      </div>
      <div id="mgr-list"></div>
    </div>
    <div class="sheet-footer">
      <button class="btn bp bbl" id="mgr-done-btn">Done</button>
    </div>
  </div>
</div>


<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script src="js/picker.js"></script>
<script>
let newLayout = 'A';

function condBadge(c) {
  if (!c) return 'b-nv';
  if (['New','Very Good','Good','Above Average'].includes(c)) return 'b-gn';
  if (['Poor','Fair','Below Average'].includes(c)) return 'b-rd';
  return 'b-am';
}

let searchQuery = '';

let _archiveMenuOpen = null;
function toggleProjMenu(id, e) {
  e.stopPropagation();
  const menu = document.getElementById('pmenu-' + id);
  if (!menu) return;
  const wasOpen = menu.classList.contains('open');
  closeProjMenus();
  if (!wasOpen) {
    const rect = e.currentTarget.getBoundingClientRect();
    menu.style.top = (rect.bottom + 4) + 'px';
    const left = Math.min(rect.right - 160, window.innerWidth - 168);
    menu.style.left = Math.max(8, left) + 'px';
    menu.classList.add('open');
    _archiveMenuOpen = id;
  }
}
function closeProjMenus() {
  if (_archiveMenuOpen) {
    document.getElementById('pmenu-' + _archiveMenuOpen)?.classList.remove('open');
    _archiveMenuOpen = null;
  }
}
document.addEventListener('click', closeProjMenus);

function archiveProject(id) {
  const p = VA.db.projects.find(x => x.id === id); if (!p) return;
  const catCount = (p.cats||[]).reduce((n,c)=>(c.items||[]).length+n, 0);
  const selCount = (p.cats||[]).reduce((n,c)=>(c.items||[]).filter(i=>i.sel||(i.notes&&i.notes.trim())).length+n, 0);
  const trimmed = catCount - selCount;
  const msg = `Archive "${p.addr||'this project'}"?\n\nThis will:\n• Make it read-only\n• Remove ${trimmed} unselected blank items to save space\n• Move it to the Archived section\n\nYou can unarchive later, but the removed items cannot be recovered.`;
  if (!confirm(msg)) return;
  VA.archiveProject(id);
  renderProjects();
  toast('Project archived');
}

function unarchiveProject(id) {
  if (!confirm('Unarchive this project? It will become editable again.')) return;
  VA.unarchiveProject(id);
  renderProjects();
  toast('Project unarchived');
}

function deleteProject(id) {
  const p = VA.db.projects.find(x => x.id === id); if (!p) return;
  if (!confirm(`Delete "${p.addr||'this project'}"? This cannot be undone.`)) return;
  // Unlink from case if linked
  if (p.caseId) { const c=(VA.db.cases||[]).find(x=>x.id===p.caseId); if(c) delete c.projectId; }
  VA.db.projects = VA.db.projects.filter(x => x.id !== id);
  VA.save();
  renderProjects();
  toast('Project deleted');
}

let _archivedExpanded = false;
function toggleArchivedSection() {
  _archivedExpanded = !_archivedExpanded;
  renderProjects();
}

function renderProjects() {
  const el = document.getElementById('proj-list');
  const db = VA.db;
  let sorted = [...db.projects].sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    sorted = sorted.filter(p =>
      (p.addr||'').toLowerCase().includes(q) ||
      (p.ref||'').toLowerCase().includes(q) ||
      (p.ptype||'').toLowerCase().includes(q) ||
      (p.valuer||'').toLowerCase().includes(q)
    );
  }
  const active   = sorted.filter(p => !p.archived);
  const archived = sorted.filter(p => p.archived);
  document.getElementById('proj-count').textContent = 'Projects (' + active.length + ')';
  if (!active.length && !archived.length) {
    el.innerHTML = db.projects.length
      ? '<div class="empty-state"><div class="esi">&#128270;</div><h3>No results</h3><p>No projects match your search.</p></div>'
      : '<div class="empty-state"><div class="esi">&#128196;</div><h3>No projects yet</h3><p>Tap + to create your first inspection project.</p></div>';
    return;
  }
  const today = (()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
  const upcoming  = active.filter(p => !p.date || p.date >= today);
  const inspected = active.filter(p => p.date && p.date < today);

  const cardHtml = p => {
    const isArchived = !!p.archived;
    const menuId = 'pmenu-' + p.id;
    return `<div class="proj-card" onclick="location.href='editor.html?id=${p.id}'" style="${isArchived?'opacity:.65':''}">
      <div class="pc-icon" style="${isArchived?'color:var(--txmt)':''}">
        ${isArchived ? '&#128274;' : (p.layout==='B' ? '&#127968;' : '&#128196;')}
      </div>
      <div style="flex:1;min-width:0">
        <div class="pc-title">${VA.esc(p.addr||'Untitled')}</div>
        <div class="pc-sub">${p.ref?'#'+VA.esc(p.ref)+' &bull; ':''}${VA.esc(p.valuer||'')}${p.occ?' &bull; '+VA.esc(p.occ):''}</div>
      </div>
      <div class="pc-meta">
        <div class="badge b-nv" style="margin-bottom:4px;font-size:10px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${VA.esc(p.ptype||'—')}</div>
        <div style="font-size:12px;color:var(--txmt)">${VA.fmtDate(p.date)}</div>
      </div>
      <div style="position:relative;margin-left:4px" onclick="event.stopPropagation()">
        <button class="btn bs bxs" style="padding:4px 8px;font-size:16px" onclick="toggleProjMenu('${p.id}',event)">&#8942;</button>
        <div class="cat-menu" id="${menuId}" style="min-width:160px">
          ${isArchived
            ? '<div class="cat-menu-item" onclick="closeProjMenus();unarchiveProject(\''+p.id+'\')">&#128275; Unarchive</div>'
            : '<div class="cat-menu-item" onclick="closeProjMenus();archiveProject(\''+p.id+'\')">&#128274; Archive</div>'
          }
          <div class="cat-menu-item danger" onclick="closeProjMenus();deleteProject('${p.id}')">&#10005; Delete</div>
        </div>
      </div>
    </div>`;
  };

  const sectionHdr = (label, color, extra='') =>
    `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txmt);padding:14px 2px 6px;display:flex;align-items:center;gap:6px${extra}"><span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block"></span>${label}</div>`;

  let html = upcoming.map(cardHtml).join('');
  if (inspected.length) {
    html += sectionHdr('Inspected', 'var(--gn)');
    html += inspected.map(cardHtml).join('');
  }
  if (archived.length) {
    html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txmt);padding:14px 2px 6px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleArchivedSection()">
      <div style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:var(--bd);display:inline-block"></span>Archived (${archived.length})</div>
      <span style="font-size:14px">${_archivedExpanded ? '&#9650;' : '&#9660;'}</span>
    </div>`;
    if (_archivedExpanded) html += archived.map(cardHtml).join('');
  }
  el.innerHTML = html;
}

function refreshValuerDrop() {
  const s = document.getElementById('np-valuer'); if (!s) return;
  const cur = s.value;
  s.innerHTML = '<option value="">— Select —</option>' + VA.db.valuers.map(v=>`<option${v===cur?' selected':''}>${VA.esc(v)}</option>`).join('');
}
function refreshPtypeDrop() {
  const s = document.getElementById('np-ptype'); if (!s) return;
  const cur = s.value;
  s.innerHTML = '<option value="">— Select —</option>' + VA.db.propertyTypes.map(t=>`<option${t===cur?' selected':''}>${VA.esc(t)}</option>`).join('');
}

function openValuerMgr() {
  openInlineMgr('Manage Valuers',
    () => VA.db.valuers,
    val => { if (!VA.db.valuers.includes(val)) { VA.db.valuers.push(val); VA.save(); } },
    i => { VA.db.valuers.splice(i,1); VA.save(); },
    () => refreshValuerDrop()
  );
}
function openPtypeMgr() {
  openInlineMgr('Property Types',
    () => VA.db.propertyTypes,
    val => { if (!VA.db.propertyTypes.includes(val)) { VA.db.propertyTypes.push(val); VA.save(); } },
    i => { VA.db.propertyTypes.splice(i,1); VA.save(); },
    () => refreshPtypeDrop()
  );
}

function pickLayout(l) {
  newLayout = l;
  document.getElementById('lb-a').classList.toggle('selected', l==='A');
  document.getElementById('lb-b').classList.toggle('selected', l==='B');
}

function openNewProject() {
  newLayout = 'A'; pickLayout('A');
  const now = new Date();
  const _y=now.getFullYear(),_m=String(now.getMonth()+1).padStart(2,'0'),_d=String(now.getDate()).padStart(2,'0');
  document.getElementById('np-date').value = _y+'-'+_m+'-'+_d;
  document.getElementById('np-time').value = now.toTimeString().slice(0,5);
  ['np-ref','np-addr','np-storeys'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('np-occ').value = '';
  document.getElementById('np-cond').value = '';
  refreshValuerDrop(); refreshPtypeDrop();
  // Template dropdown
  VA.seed();
  const ts = document.getElementById('np-tpl');
  ts.innerHTML = VA.db.templates.map((t,i)=>`<option value="${i}">${VA.esc(t.name)}</option>`).join('');
  const defIdx = VA.db.templates.findIndex(t=>t.name===VA.DEFAULT_TPL);
  ts.value = defIdx >= 0 ? String(defIdx) : '0';
  openOv('ov-new');
}

function createProject() {
  const addr = document.getElementById('np-addr').value.trim();
  if (!addr) { toast('Please enter a property address'); return; }
  const tplIdx = parseInt(document.getElementById('np-tpl').value);
  const tpl = !isNaN(tplIdx) ? VA.db.templates[tplIdx] : VA.db.templates.find(t=>t.name===VA.DEFAULT_TPL) || VA.db.templates[0];
  // Warn if template has no categories
  if (tpl && !(tpl.categoryIds||[]).length) {
    if (!confirm('The selected template has no categories. The project will start with no inspection findings sections. Continue?')) return;
  }
  const p = {
    id: VA.uid(), layout: newLayout,
    ref: document.getElementById('np-ref').value.trim(),
    date: document.getElementById('np-date').value,
    time: document.getElementById('np-time').value,
    valuer: document.getElementById('np-valuer').value,
    ptype: document.getElementById('np-ptype').value,
    storeys: document.getElementById('np-storeys').value,
    occ: document.getElementById('np-occ').value,
    addr, cond: document.getElementById('np-cond').value,
    remarks: '',
    cats: tpl ? VA.snapshotCats(tpl) : VA.activeCats().map(c=>({id:c.id,name:c.name,items:c.items.map(it=>({name:it,sel:false})),notes:''})),
    roomSnapshot: tpl ? VA.snapshotRooms(tpl) : VA.getActiveRooms(),
    levels: [], createdAt: Date.now()
  };
  if (p.layout==='A') p.levels = [{id:VA.uid(),name:'Accommodation',rooms:[],notes:''}];
  // Link to case if launched from tracker
  const fromCaseId = document.getElementById('ov-new')?.dataset?.fromCase;
  if (fromCaseId) {
    const c = (VA.db.cases||[]).find(x => x.id === fromCaseId);
    if (c) { p.caseId = c.id; c.projectId = p.id; delete document.getElementById('ov-new').dataset.fromCase; }
  }
  VA.db.projects.push(p); VA.save();
  closeOv('ov-new');
  toast('Project created');
  setTimeout(() => location.href = 'editor.html?id='+p.id, 200);
}

function openNewProjectFromCase(c) {
  // Open the project sheet normally first (populates dropdowns + template)
  openNewProject();
  // Then override fields with case data
  const set = (id,val) => { const el=document.getElementById(id); if(el&&val) el.value=val; };
  set('np-ref', c.ref);
  set('np-addr', c.addr);
  set('np-date', c.inspDate);
  set('np-time', c.inspTime);
  // Property type: match by text since options are now populated
  if (c.ptype) {
    const sel = document.getElementById('np-ptype');
    if (sel) [...sel.options].forEach(o => { if(o.text===c.ptype||o.value===c.ptype) sel.value=o.value; });
  }
  // Store caseId for linking after creation
  document.getElementById('ov-new').dataset.fromCase = c.id;
}

pageInit();

// Handle redirect from case-editor "Create Project" button
(function() {
  const params = new URLSearchParams(location.search);
  if (params.get('fromCase')) {
    try {
      const pending = JSON.parse(sessionStorage.getItem('va_new_from_case')||'null');
      if (pending && pending.caseId) {
        const c = (VA.db.cases||[]).find(x => x.id === pending.caseId);
        if (c) {
          sessionStorage.removeItem('va_new_from_case');
          openNewProjectFromCase(c);
          history.replaceState(null, '', 'index.html');
          return;
        }
      }
    } catch(e) {}
  }
})();

renderProjects();
</script>
</body>
</html>
