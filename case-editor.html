<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a5c">
<title>ValueAid — Case</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
<style>
.prog-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px;background:var(--sf);cursor:pointer;user-select:none;transition:all var(--tr)}
.prog-item.active{border-color:var(--bl);background:var(--blbg)}
.prog-item.complete{border-color:var(--gn);background:var(--gnbg)}
.prog-item:active{opacity:.8}
.prog-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all var(--tr)}
.prog-item.active .prog-dot{border-color:var(--bl);background:var(--bl);color:#fff}
.prog-item.complete .prog-dot{border-color:var(--gn);background:var(--gn);color:#fff}
.prog-label{flex:1;font-size:14px;font-weight:500;color:var(--txmt)}
.prog-item.active .prog-label{color:var(--bl);font-weight:600}
.prog-item.complete .prog-label{color:var(--gn);font-weight:600}
.linked-box{background:var(--gnbg);border:1px solid var(--gn);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.unlinked-box{background:var(--sf2);border:1px dashed var(--bd);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ref-warn{font-size:11px;color:var(--am);margin-top:3px;display:none}
.ref-warn.show{display:block}
.quick-date{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;align-items:center}
.qdBtn{font-size:11px;padding:4px 10px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);cursor:pointer;white-space:nowrap}
.qdBtn:active{background:var(--sf2)}
.cat-menu{position:fixed;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);z-index:300;min-width:160px;padding:4px 0;display:none}
.cat-menu.open{display:block}
.cat-menu-item{padding:11px 14px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--tx)}
.cat-menu-item:active{background:var(--sf2)}
.cat-menu-item.danger{color:var(--rd)}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <a href="tracker.html" class="hbtn">&#8592;</a>
    <span class="logo" id="ce-title" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">Case</span>
    <div class="hdr-acts"><a href="settings.html" class="hbtn settings-btn">&#9881; Settings</a></div>
  </header>
  <div class="page-content">
    <div class="pgw" id="ce-body">
      <p style="padding:20px;text-align:center;color:var(--txmt)">Loading...</p>
    </div>
  </div>
  <div class="sticky-bar">
    <button class="btn brd bsm" onclick="confirmDeleteCase()">Delete</button>
    <button class="btn bp" style="flex:1" onclick="caseClose()">Close</button>
  </div>
</div>
<div id="toast"></div>

<div class="overlay center" id="ov-conf">
  <div class="modal-box">
    <h3 id="conf-title">Confirm</h3>
    <p id="conf-msg" style="white-space:pre-wrap;font-size:13px;line-height:1.5"></p>
    <div class="modal-footer">
      <button class="btn bs" onclick="closeOv('ov-conf')">Cancel</button>
      <button class="btn brd" id="conf-btn">Confirm</button>
    </div>
  </div>
</div>

<div class="overlay" id="va-picker-ov">
  <div class="sheet" style="display:flex;flex-direction:column;max-height:88vh">
    <div id="va-pk-list" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px"></div>
    <div style="flex-shrink:0;padding:12px 16px;border-top:1px solid var(--bd);background:var(--sf)">
      <div id="va-pk-custom-row" style="display:none;gap:6px;margin-bottom:8px">
        <input type="text" id="va-pk-custom-inp" placeholder="Add custom..." style="flex:1">
        <button class="btn bp bsm" onclick="VA_PICKER.addCustom()">Add</button>
      </div>
      <div style="position:relative;margin-bottom:10px">
        <input type="text" id="va-pk-search" placeholder="Search..." style="padding-left:32px"
               oninput="VA_PICKER._onSearch(this.value)">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txmt);font-size:15px;pointer-events:none">⌕</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span id="va-pk-title" style="font-size:15px;font-weight:600"></span>
        <button class="btn bp bsm" id="va-pk-done">Done</button>
      </div>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script src="js/picker.js"></script>
<script>
'use strict';

let cid = null;
const gC = () => (VA.db.cases||[]).find(x => x.id === cid);

function addDays(date, days) {
  const d = new Date(date + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function getLinkConflicts(c, p) {
  const ow = [];
  if (p.ref && c.ref && p.ref !== c.ref) ow.push('Ref (' + p.ref + ' → ' + c.ref + ')');
  if (p.addr && c.addr && p.addr !== c.addr) ow.push('Address');
  if (p.date && c.inspDate && p.date !== c.inspDate) ow.push('Insp. Date');
  if (p.time && c.inspTime && p.time !== c.inspTime) ow.push('Insp. Time');
  return ow;
}

// ── Build page ────────────────────────────────────────────────
function buildCase(c) {
  document.getElementById('ce-title').textContent = c.ref ? '#' + c.ref : 'New Case';

  let linkedHtml = '';
  if (c.projectId) {
    const p = VA.db.projects.find(x => x.id === c.projectId);
    linkedHtml = '<div class="linked-box">' +
      '<span style="font-size:18px">&#128279;</span>' +
      '<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--gn)">Linked to Inspection Project</div>' +
      '<div style="font-size:12px;color:var(--tx)">' + VA.esc(p ? (p.addr||p.ref||'Project') : 'Project not found — please unlink') + '</div></div>' +
      (p ? '<button class="btn bs bsm" onclick="viewLinkedProject()">View</button>' : '') +
      '<button class="btn brd bsm" onclick="unlinkProject()">Unlink</button></div>';
  } else {
    linkedHtml = '<div class="unlinked-box">' +
      '<span style="font-size:18px;color:var(--txmt)">&#128279;</span>' +
      '<div style="flex:1;font-size:12px;color:var(--txmt)">No inspection project linked</div>' +
      '<button class="btn bs bsm" onclick="createLinkedProject()">+ Create Project</button></div>';
  }

  const delayedCls = c.delayed ? 'btn bsm' : 'btn bs bsm';
  const delayedStyle = c.delayed ? 'background:var(--am);border-color:var(--am);color:#fff' : '';

  document.getElementById('ce-body').innerHTML = linkedHtml +

    '<div class="sectlbl">Case Information</div>' +

    '<div class="fg"><label class="fl">Reference No. <span style="font-size:11px;color:var(--txmt)">(6-digit numeric)</span></label>' +
    '<input type="text" id="ce-ref" inputmode="numeric" maxlength="6" placeholder="e.g. 240123" value="' + VA.esc(c.ref||'') + '" oninput="ceRefInput(this.value)">' +
    '<div class="ref-warn" id="ref-warn">&#9888; Ref no. should be exactly 6 digits</div></div>' +

    '<div class="fg"><label class="fl">Address</label>' +
    '<input type="text" id="ce-addr" placeholder="Property address" value="' + VA.esc(c.addr||'') + '" oninput="ceSave()"></div>' +

    '<div class="fg"><label class="fl">Client / Contact</label>' +
    '<input type="text" id="ce-client" placeholder="Name" value="' + VA.esc(c.client||'') + '" oninput="ceSave()"></div>' +

    '<div class="fg"><label class="fl">Mobile No.</label>' +
    '<input type="tel" id="ce-phone" placeholder="e.g. 9123 4567" value="' + VA.esc(formatPhoneVal(c.phone||'')) + '" oninput="cePhoneInput(this)"></div>' +

    '<div class="r2">' +
    '<div class="fg"><label class="fl">Inspection Date</label><input type="date" id="ce-inspdate" value="' + (c.inspDate||'') + '" onchange="ceSave()"></div>' +
    '<div class="fg"><label class="fl">Inspection Time</label><input type="time" id="ce-insptime" value="' + (c.inspTime||'') + '" onchange="ceSave()"></div>' +
    '</div>' +

    '<div class="fg"><label class="fl">Created</label>' +
    '<input type="date" id="ce-created" value="' + (c.createdAt||'') + '" onchange="ceSave()"></div>' +

    '<div class="fg"><label class="fl">Deadline</label>' +
    '<input type="date" id="ce-deadline" value="' + (c.deadline||'') + '" onchange="ceSave()">' +
    '<div class="quick-date"><span style="font-size:11px;color:var(--txmt)">From created date:</span>' +
    '<button class="qdBtn" onclick="setDeadlineQuick(5)">+5 days</button>' +
    '<button class="qdBtn" onclick="setDeadlineQuick(7)">+7 days</button>' +
    '<button class="qdBtn" onclick="setDeadlineQuick(14)">+14 days</button></div></div>' +

    '<div class="divider"></div>' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
    '<div class="sectlbl" style="margin:0">Progress</div>' +
    '<div style="display:flex;align-items:center;gap:8px">' +
    '<button id="delayed-tog" class="' + delayedCls + '" style="' + delayedStyle + '" onclick="toggleDelayed()">&#9200; Delayed</button>' +
    '<button class="btn bs bsm" onclick="addProgressStage()">+ Add</button>' +
    '</div></div>' +
    '<div id="prog-list"></div>' +

    '<div class="divider"></div>' +
    '<div class="sectlbl">Notes</div>' +
    '<div class="fg"><textarea id="ce-notes" rows="4" placeholder="General notes about this case..." oninput="ceSave()">' + VA.esc(c.notes||'') + '</textarea></div>';

  renderProgList(c);
  ceRefInput(c.ref||'');
}

// ── Progress pipeline ─────────────────────────────────────────
function renderProgList(c) {
  const el = document.getElementById('prog-list'); if (!el) return;
  const stages = c.checklistSnapshot || VA.BUILTIN_STAGES;
  const currentStage = c.stage || (stages[0]||'');
  const lastIdx = stages.length - 1;

  if (!stages.length) {
    el.innerHTML = '<p class="hint">No stages. Tap + Add to add one.</p>';
    return;
  }
  el.innerHTML = stages.map((st, i) => {
    const isActive = currentStage === st;
    const isComplete = isActive && i === lastIdx;
    let cls = 'prog-item';
    if (isComplete) cls += ' complete';
    else if (isActive) cls += ' active';
    const dot = isActive ? (isComplete ? '✓' : '●') : '';
    return '<div class="' + cls + '" onclick="setStage(\'' + VA.esc(st) + '\')">' +
      '<div class="prog-dot">' + dot + '</div>' +
      '<span class="prog-label">' + VA.esc(st) + '</span>' +
      '<div style="display:flex;align-items:center" onclick="event.stopPropagation()">' +
      '<button class="btn bs bsm" style="padding:3px 7px;font-size:14px;line-height:1" id="progmenu-btn-' + i + '" onclick="toggleProgMenu(' + i + ',event)">&#8942;</button>' +
      '<div class="cat-menu" id="progmenu-' + i + '">' +
      '<div class="cat-menu-item" onclick="closeProgMenu();moveStage(' + i + ',-1)"' + (i===0?' style="opacity:.4;pointer-events:none"':'') + '>&#8593; Move Up</div>' +
      '<div class="cat-menu-item" onclick="closeProgMenu();moveStage(' + i + ',1)"' + (i===stages.length-1?' style="opacity:.4;pointer-events:none"':'') + '>&#8595; Move Down</div>' +
      '<div class="cat-menu-item danger" onclick="closeProgMenu();removeStage(' + i + ')">&#10005; Remove</div>' +
      '</div></div></div>';
  }).join('');
}

let _openProgMenu = null;
function toggleProgMenu(i, e) {
  e.stopPropagation();
  const menu = document.getElementById('progmenu-' + i); if (!menu) return;
  const wasOpen = menu.classList.contains('open');
  closeProgMenu();
  if (!wasOpen) {
    const rect = e.currentTarget.getBoundingClientRect();
    menu.style.top = (rect.bottom + 4) + 'px';
    const left = Math.min(rect.right - 160, window.innerWidth - 168);
    menu.style.left = Math.max(8, left) + 'px';
    menu.classList.add('open');
    _openProgMenu = i;
  }
}
function closeProgMenu() {
  if (_openProgMenu !== null) {
    document.getElementById('progmenu-' + _openProgMenu)?.classList.remove('open');
    _openProgMenu = null;
  }
}
document.addEventListener('click', closeProgMenu);

function setStage(stage) {
  const c = gC(); if (!c) return;
  c.stage = stage; VA.save(); renderProgList(c);
}

function toggleDelayed() {
  const c = gC(); if (!c) return;
  c.delayed = !c.delayed;
  const btn = document.getElementById('delayed-tog');
  if (btn) {
    btn.className = c.delayed ? 'btn bsm' : 'btn bs bsm';
    btn.style.cssText = c.delayed ? 'background:var(--am);border-color:var(--am);color:#fff' : '';
  }
  VA.save();
}

function addProgressStage() {
  const name = prompt('New stage name:');
  if (!name || !name.trim()) return;
  const c = gC(); if (!c) return;
  if (!c.checklistSnapshot) c.checklistSnapshot = [...VA.BUILTIN_STAGES];
  if (c.checklistSnapshot.includes(name.trim())) { toast('Stage already exists'); return; }
  c.checklistSnapshot.push(name.trim());
  if (!c.stage) c.stage = c.checklistSnapshot[0];
  VA.save(); renderProgList(c); toast('Stage added');
}

function moveStage(i, dir) {
  const c = gC(); if (!c) return;
  if (!c.checklistSnapshot) c.checklistSnapshot = [...VA.BUILTIN_STAGES];
  const arr = c.checklistSnapshot;
  if (i + dir < 0 || i + dir >= arr.length) return;
  [arr[i], arr[i+dir]] = [arr[i+dir], arr[i]];
  VA.save(); renderProgList(c);
}

function removeStage(i) {
  const c = gC(); if (!c) return;
  if (!c.checklistSnapshot) c.checklistSnapshot = [...VA.BUILTIN_STAGES];
  const arr = c.checklistSnapshot;
  if (!confirm('Remove stage "' + arr[i] + '"?')) return;
  if (c.stage === arr[i]) c.stage = arr.find((_,j) => j !== i) || '';
  arr.splice(i, 1);
  VA.save(); renderProgList(c);
}

// ── Phone auto-format (8 digits → XXXX XXXX) ─────────────────
function formatPhoneVal(val) {
  const digits = (val||'').replace(/\D/g, '');
  return digits.length === 8 ? digits.slice(0,4) + ' ' + digits.slice(4) : val;
}
function cePhoneInput(inp) {
  const digits = inp.value.replace(/\D/g, '');
  if (digits.length === 8) {
    const formatted = digits.slice(0,4) + ' ' + digits.slice(4);
    if (inp.value !== formatted) inp.value = formatted;
  }
  ceSave();
}

// ── Ref validation ────────────────────────────────────────────
function ceRefInput(val) {
  const warn = document.getElementById('ref-warn');
  if (warn) warn.classList.toggle('show', val.length > 0 && !/^\d{6}$/.test(val));
  ceSave();
}

// ── Deadline quick set ────────────────────────────────────────
function setDeadlineQuick(n) {
  const c = gC(); if (!c) return;
  const base = c.createdAt || new Date().toISOString().slice(0,10);
  const dl = addDays(base, n);
  const inp = document.getElementById('ce-deadline'); if (!inp) return;
  inp.value = dl; ceSave();
}

// ── Save with sync to linked project ─────────────────────────
function ceSave() {
  const c = gC(); if (!c) return;
  const v  = id => { const el=document.getElementById(id); return el?el.value:undefined; };
  const vt = id => { const el=document.getElementById(id); return el?el.value.trim():undefined; };
  const syncP = (field, val) => {
    if (c.projectId) { const p=VA.db.projects.find(x=>x.id===c.projectId); if(p) p[field]=val; }
  };
  if (vt('ce-ref')!==undefined)     { c.ref=vt('ce-ref'); syncP('ref',c.ref); }
  if (vt('ce-addr')!==undefined)    { c.addr=vt('ce-addr'); syncP('addr',c.addr); }
  if (vt('ce-client')!==undefined)  c.client=vt('ce-client');
  if (vt('ce-phone')!==undefined)   c.phone=vt('ce-phone');
  if (v('ce-inspdate')!==undefined) { c.inspDate=v('ce-inspdate'); syncP('date',c.inspDate); }
  if (v('ce-insptime')!==undefined) { c.inspTime=v('ce-insptime'); syncP('time',c.inspTime); }
  if (v('ce-created')!==undefined)  c.createdAt=v('ce-created');
  if (v('ce-deadline')!==undefined) c.deadline=v('ce-deadline');
  if (v('ce-notes')!==undefined)    c.notes=v('ce-notes');
  document.getElementById('ce-title').textContent = c.ref ? '#' + c.ref : 'New Case';
  VA.save();
}

function caseClose() { ceSave(); location.href='tracker.html'; }

// ── Conflict-aware linking ────────────────────────────────────
function openLinkPicker() {
  const c = gC(); if (!c) return;
  const projects = VA.db.projects.filter(p => !p.caseId || p.caseId===c.id);
  if (!projects.length) { toast('No unlinked inspection projects found'); return; }
  VA_PICKER.openSingle(
    'Link to Inspection Project',
    projects.map(p => (p.ref?'#'+p.ref+' — ':'') + (p.addr||'No address')),
    (label) => {
      const p = projects.find(p => ((p.ref?'#'+p.ref+' — ':'')+(p.addr||'No address'))===label);
      if (!p) return;
      const conflicts = getLinkConflicts(c, p);
      if (conflicts.length && !confirm('Linking will overwrite: ' + conflicts.join(', ') + '.\n\nCase values will be used. Continue?')) return;
      c.projectId=p.id; p.caseId=c.id;
      if (c.ref) p.ref=c.ref;
      if (c.addr) p.addr=c.addr;
      if (c.inspDate) p.date=c.inspDate;
      if (c.inspTime) p.time=c.inspTime;
      VA.save(); buildCase(c); toast('Linked to project');
    }, null
  );
}

function unlinkProject() {
  const c=gC(); if(!c||!c.projectId) return;
  if(!confirm('Unlink this case from the inspection project?')) return;
  const p=VA.db.projects.find(x=>x.id===c.projectId);
  if(p) delete p.caseId;
  c.projectId=null; VA.save(); buildCase(c); toast('Unlinked');
}

function viewLinkedProject() {
  const c=gC(); if(!c||!c.projectId) return;
  ceSave(); location.href='editor.html?id='+c.projectId;
}

function createLinkedProject() {
  const c=gC(); if(!c) return;
  ceSave();
  try { sessionStorage.setItem('va_new_from_case', JSON.stringify({caseId:c.id})); } catch(e) {}
  location.href='index.html?fromCase=1';
}

// ── Delete ────────────────────────────────────────────────────
function confirmDeleteCase() {
  const c=gC(); if(!c) return;
  document.getElementById('conf-title').textContent='Delete Case?';
  document.getElementById('conf-msg').textContent='Delete case "' + (c.ref||c.addr||'this case') + '"? Cannot be undone.';
  document.getElementById('conf-btn').textContent='Delete';
  document.getElementById('conf-btn').onclick=()=>{
    if(c.projectId){const p=VA.db.projects.find(x=>x.id===c.projectId);if(p)delete p.caseId;}
    VA.db.cases=VA.db.cases.filter(x=>x.id!==cid);
    VA.save(); closeOv('ov-conf'); toast('Case deleted');
    setTimeout(()=>location.href='tracker.html',400);
  };
  openOv('ov-conf');
}

// ── Init ──────────────────────────────────────────────────────
pageInit();
document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});
cid=new URLSearchParams(location.search).get('id');
const kase=gC();
if(kase){buildCase(kase);}
else{document.getElementById('ce-body').innerHTML='<p style="padding:20px;text-align:center;color:var(--txmt)">Case not found. <a href="tracker.html">Go back</a></p>';}
</script>
</body>
</html>
